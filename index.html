<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusRecall - Voice & Memory Trainer</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --container-bg: #ffffff;
            --text: #333333;
            --primary: #4a90e2;
            --border: #dddddd;
            --muted-bg: #f9f9f9;
            --error: #e74c3c;
            --success: #27ae60;
            --voice: #9b59b6;
        }

        body.dark-mode {
            --bg: #1a1a1a;
            --container-bg: #2d2d2d;
            --text: #e0e0e0;
            --primary: #357abd;
            --border: #444444;
            --muted-bg: #3a3a3a;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            padding: 20px; 
            transition: 0.3s;
        }

        .container { 
            background: var(--container-bg); 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 700px; 
            text-align: center; 
        }

        .hidden { display: none !important; }

        .timer { font-weight: bold; color: var(--error); font-size: 1.2rem; margin-bottom: 10px; }

        .text-display { 
            font-size: 1.2rem; 
            line-height: 1.6; 
            margin: 20px 0; 
            padding: 20px; 
            background: var(--muted-bg); 
            border-left: 5px solid var(--primary); 
            text-align: left; 
        }

        textarea { 
            width: 100%; 
            height: 120px; 
            padding: 12px; 
            border: 2px solid var(--border); 
            border-radius: 8px; 
            font-size: 1rem; 
            margin-bottom: 15px; 
            background: var(--container-bg);
            color: var(--text);
            resize: none;
        }

        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 25px; 
            cursor: pointer; 
            font-size: 1rem; 
            font-weight: 600;
            margin: 5px; 
        }

        button:hover { opacity: 0.9; }

        .btn-voice { background: var(--voice); }
        .btn-voice.recording { background: var(--error); animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .missing-word { color: var(--error); text-decoration: line-through; font-weight: bold; }
        .correct-word { color: var(--success); }
        
        .phase-breakdown { 
            background: var(--muted-bg); 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            border: 1px solid var(--border); 
            text-align: left;
        }
    </style>
</head>
<body>

<div style="width: 100%; max-width: 700px; display: flex; justify-content: flex-end; margin-bottom: 10px;">
    <button onclick="toggleDarkMode()" style="font-size: 0.8rem; padding: 5px 15px;">Toggle Theme</button>
</div>

<div class="container">
    <h1>FocusRecall</h1>
    
    <div id="menu-screen">
        <p>Train your focus. Read once, then recall.</p>
        <label>Difficulty: </label>
        <select id="difficulty" style="padding: 8px; border-radius: 5px; margin-bottom: 20px;">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
        </select>
        <br>
        <button onclick="startGame()">Start Game</button>
    </div>

    <div id="play-screen" class="hidden">
        <div id="phase-indicator" style="font-weight: bold;"></div>
        <div class="timer" id="timer-display"></div>
        <div id="read-section">
            <div class="text-display" id="text-to-read"></div>
        </div>
        <div id="type-section" class="hidden">
            <textarea id="user-input" placeholder="Type or speak your answer..."></textarea>
            <br>
            <button id="voice-btn" class="btn-voice" onclick="handleVoice()">🎤 Speak Answer</button>
            <button onclick="submitAttempt()">Submit</button>
        </div>
        <div id="feedback-section" class="hidden">
            <h3>Round Comparison</h3>
            <div id="comparison-output" class="text-display" style="font-size: 1rem; border-left-color: var(--success);"></div>
            <button onclick="nextPhase()">Continue</button>
        </div>
    </div>

    <div id="results-screen" class="hidden">
        <h2>Final Results</h2>
        <h3 id="final-total"></h3>
        <div id="scores-list"></div>
        <button onclick="location.reload()">New Paragraph</button>
    </div>
</div>

<script>
    const content = {
        easy: [
            ["The cat sat on the mat.", "It was a sunny day.", "Birds like to sing songs.", "The blue ball bounced high.", "He ate a green apple.", "Dogs love to play catch.", "The sun went down."],
            ["A big red bus stopped.", "The grass is very green.", "I like to eat pizza.", "My mom is very kind.", "The fish swims in water.", "Rain falls from the clouds.", "The stars shine at night."],
            ["The frog jumped in the pond.", "I have a yellow pencil.", "The cake tastes very sweet.", "The wind blows the leaves.", "My friend has a bike.", "A rabbit hops in the grass.", "The moon is big and round."],
            ["The boat floats on the lake.", "I can see the tall trees.", "She has a pretty dress.", "The bell rings for school.", "We saw a brown bear.", "The soup is hot and good.", "Brush your teeth every day."],
            ["The spider made a web.", "The sky is clear and blue.", "I lost my blue shoe.", "The elephant is very large.", "We go to sleep at night.", "The rain makes puddles.", "Look at the colorful rainbow."],
            ["The clock ticks on the wall.", "Flowers grow in the garden.", "The milk is in the cup.", "A bird made a nest.", "Snow is cold.", "I wear a hat.", "Jump in the leaves."],
            ["The car is fast.", "The sun is hot.", "I see a bug.", "Apples are red.", "The dog is loud.", "I like juice.", "The bed is soft."],
            ["The duck says quack.", "The ball is round.", "I am happy.", "The tree is tall.", "I have a book.", "The cat sleeps.", "Birds fly high."],
            ["The fire is red.", "I see the moon.", "The cow says moo.", "The pig is pink.", "I like to play.", "The bus is big.", "I wear shoes."],
            ["The sky is dark.", "The stars are bright.", "I see a fish.", "The water is blue.", "I like bread.", "The box is small.", "Run to the door."]
        ],
        medium: [
            ["Reading every day improves your focus and memory.", "Technological advances are changing how we interact.", "The climate varies significantly across different continents.", "Learning a new language requires consistent daily practice.", "Sustainable living helps protect the environment for kids.", "Ocean currents play a major role in global weather.", "Healthy eating provides the energy needed for work."],
            ["Exercise is essential for maintaining a healthy heart.", "Many people prefer drinking coffee in the morning.", "The library is a quiet place to study and learn.", "Volunteers play a vital role in local communities.", "Space exploration helps us understand our solar system.", "Digital privacy is a growing concern for internet users.", "Urban planning can reduce traffic in busy cities."],
            ["Music has the power to influence our daily mood.", "Historical documents provide insight into the past.", "Effective communication is key to professional success.", "Wildfire prevention is crucial during the dry summer.", "Modern smartphones are more powerful than old computers.", "Regular sleep patterns improve overall mental health.", "Art galleries showcase the creativity of local artists."],
            ["Recycling helps reduce the amount of waste in landfills.", "Teamwork is necessary for solving complex problems.", "The solar system consists of eight major planets.", "Yoga is a great way to improve your flexibility.", "Traveling to new places broadens your perspective.", "Writing in a journal can help clear your mind.", "Modern medicine has increased the average lifespan."],
            ["Forests act as the lungs of our planet.", "Investing in stocks can be a way to build wealth.", "Social media allows us to stay connected with friends.", "Clean water is a basic human right for everyone.", "The scientific method is used to test new ideas.", "Photography captures special moments in time.", "Biking is a healthy alternative to driving a car."],
            ["Public transportation reduces the carbon footprint.", "Learning to cook is a valuable life skill.", "The internet changed how we access information.", "Small businesses are vital for the economy.", "Protecting wildlife preserves our biodiversity.", "Education opens many doors for the future.", "Gardening is a relaxing hobby for many."],
            ["Invention of fire was a turning point for humans.", "Electric cars are becoming more common.", "Architecture combines both art and engineering.", "Mental health is as important as physical health.", "Community gardens provide fresh produce.", "Space telescopes see distant galaxies.", "Ocean pollution is a threat to marine life."],
            ["Leadership is required during times of crisis.", "The atmosphere protects us from radiation.", "Volunteering is a rewarding experience.", "Critical thinking is an essential skill.", "Renewable energy is becoming popular.", "Nutrition is vital for child development.", "Art helps express human emotion."],
            ["History prevents us from repeating mistakes.", "Mindfulness reduces stress and anxiety.", "The economy is influenced by many factors.", "AI is being used in many fields today.", "A balanced diet includes many vegetables.", "Fiction reading can increase empathy.", "Time management increases productivity."],
            ["Deep sea exploration reveals new life forms.", "The legal system provides justice for all.", "Culture is expressed through art and song.", "Physical activity is good for the mind.", "Learning an instrument takes patience.", "Weather is influenced by pressure.", "Scientific discovery requires curiosity."]
        ],
        hard: [
            ["The ephemeral nature of digital communication complicates archival efforts.", "Metacognition allows individuals to monitor their own cognitive processes.", "Socioeconomic disparities often dictate the accessibility of higher education.", "Quantum entanglement suggests a profound interconnection within the universe.", "The juxtaposition of classical art and modern architecture is striking.", "Pragmatism remains a cornerstone of effective organizational leadership.", "Nuanced perspectives are essential when navigating complex geopolitical issues."],
            ["The inherent ambiguity of the law requires judicial interpretation.", "Macroeconomic fluctuations can destabilize emerging global markets.", "Philosophical inquiries into the nature of reality are perennial.", "Biodiversity loss poses a significant threat to global food security.", "The integration of artificial intelligence requires rigorous oversight.", "Cognitive dissonance occurs when holding two conflicting beliefs.", "Subtle linguistic variations can alter the meaning of a text."],
            ["Structural integrity is paramount in civil engineering projects.", "The proliferation of misinformation undermines democratic institutions.", "Epistemological debates center on the nature and scope of knowledge.", "Sustainable development requires a balance of economic and social goals.", "Aesthetic appreciation is often influenced by cultural paradigms.", "The internal combustion engine revolutionized modern transportation.", "Paradigm shifts in science often encounter initial resistance."],
            ["The sequestration of carbon is vital for climate mitigation.", "Algorithmic bias can perpetuate systemic inequalities in society.", "Neuroplasticity enables the brain to reorganize itself after injury.", "The convergence of biotechnology and ethics is a major challenge.", "Phenomenological research focuses on lived human experiences.", "The decentralization of finance via blockchain is a nascent trend.", "Implicit biases can unconsciously affect our decision making."],
            ["The synthesis of organic compounds is a core facet of chemistry.", "Linguistic determinism suggests language shapes our thoughts.", "The stratification of society is often based on wealth.", "Teleological arguments focus on the design and purpose of nature.", "The utilization of renewable resources is imperative for survival.", "Interdisciplinary approaches are required for complex research.", "The manifestation of cultural identity is multifaceted."],
            ["Structural dynamics require careful mathematical modeling.", "Existentialism explores the meaning of individual existence.", "The codification of international law is an ongoing process.", "Technological obsolescence occurs at an accelerating rate.", "The redistribution of wealth is a contentious political topic.", "Ubiquity of smartphones has altered social interactions.", "Cognitive load theory explains how we process information."],
            ["Historical revisionism can provide new insights into the past.", "The complexity of the human genome is still being mapped.", "Allocation of resources must be handled with extreme care.", "Paradox of choice suggests that more options cause stress.", "Commodification of data raises significant privacy issues.", "Empirical evidence is the foundation of scientific method.", "Amplification of sound requires precise engineering."],
            ["Sophistication of cyberattacks is a growing global concern.", "Standardization of testing remains a controversial issue.", "Exploitation of natural resources leads to degradation.", "Crystallization of ideas occurs through rigorous debate.", "Implementation of new policies requires public support.", "Volatility of the stock market creates financial risk.", "Intersectionality of identity informs personal experiences."],
            ["Erosion of coastal regions is accelerated by rising seas.", "Democratization of information has empowered citizens.", "Versatility of graphene makes it a revolutionary material.", "Cultivation of critical thinking is a primary goal.", "Manifestation of symptoms varies between individuals.", "Integration of global markets has led to interdependence.", "Validation of scientific theories requires peer review."],
            ["Preservation of cultural heritage is a global responsibility.", "Nuances of diplomatic negotiations are often hidden.", "Transformation of energy is a fundamental law of physics.", "Proliferation of digital tools has changed the workplace.", "Susceptibility of systems to failure must be analyzed.", "Interpretation of data requires a skeptical mindset.", "Evolution of language is a dynamic process."]
        ]
    };

    let currentParagraph = [];
    let currentPhase = 1; 
    let phaseScores = [];
    let timer;

    // Dark Mode Toggle
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }

// --- FIXED SPEECH LOGIC FOR GITHUB PAGES ---
let recognition;
let isListening = false;
let speechInitialized = false;

function initSpeech() {
    if (speechInitialized) return;

    window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!window.SpeechRecognition) {
        console.warn("Speech recognition is not supported in this browser.");
        document.getElementById('voice-btn').disabled = true;
        document.getElementById('voice-btn').innerText = "🎤 Not Supported";
        return false;
    }

    try {
        recognition = new window.SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onstart = () => {
            isListening = true;
            const btn = document.getElementById('voice-btn');
            btn.innerText = "Listening...";
            btn.classList.add('recording');
        };

        recognition.onresult = (event) => {
            if (event.results && event.results.length > 0) {
                const text = event.results[0][0].transcript;
                const input = document.getElementById('user-input');

                // Append instead of overwrite
                input.value = text;
            }
        };

        recognition.onend = () => {
            isListening = false;
            const btn = document.getElementById('voice-btn');
            if (btn) {
                btn.innerText = "🎤 Speak Answer";
                btn.classList.remove('recording');
            }
        };

        recognition.onerror = (event) => {
            console.error("Speech Error:", event.error);
            isListening = false;
            const btn = document.getElementById('voice-btn');
            if (btn) {
                btn.innerText = "🎤 Speak Answer";
                btn.classList.remove('recording');
            }

            // Handle different error scenarios for GitHub Pages
            if (event.error === 'not-allowed' || event.error === 'permission-denied') {
                alert("Microphone permission denied. Please:\n1. Check browser permissions\n2. Refresh the page\n3. Click the microphone icon when prompted");
            } else if (event.error === 'network') {
                alert("Network error. Check your connection.");
            } else if (event.error !== 'no-speech') {
                console.error("Speech recognition error:", event.error);
            }
        };

        speechInitialized = true;
        return true;
    } catch (e) {
        console.error("Failed to initialize speech recognition:", e);
        return false;
    }
}

function handleVoice() {
    if (!recognition) {
        if (!initSpeech()) return;
    }

    try {
        if (isListening) {
            recognition.stop(); // toggle off
        } else {
            recognition.start(); // start
        }
    } catch (e) {
        console.log("Restarting recognition...");
        try {
            recognition.stop();
            setTimeout(() => {
                try {
                    recognition.start();
                } catch (err) {
                    console.error("Failed to restart recognition:", err);
                }
            }, 200);
        } catch (err) {
            console.error("Error during restart:", err);
        }
    }
}

    // Game Logic
    function startGame() {
        const diff = document.getElementById('difficulty').value;
        const pool = content[diff];
        const selected = pool[Math.floor(Math.random() * pool.length)];
        currentParagraph = [...selected].sort(() => 0.5 - Math.random()).slice(0, 5);
        
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('play-screen').classList.remove('hidden');
        currentPhase = 1; phaseScores = [];
        
        // Initialize speech recognition early to request microphone permission
        initSpeech();
        
        startPhase();
    }

    function startPhase() {
        document.getElementById('feedback-section').classList.add('hidden');
        document.getElementById('type-section').classList.add('hidden');
        document.getElementById('read-section').classList.remove('hidden');
        document.getElementById('user-input').value = "";
        
        const diff = document.getElementById('difficulty').value;
        const text = currentParagraph.slice(0, currentPhase).join(" ");
        document.getElementById('text-to-read').innerText = text;
        document.getElementById('phase-indicator').innerText = `Phase ${currentPhase} of 5`;

        const mult = (diff === 'hard') ? 8 : (diff === 'medium' ? 6 : 4);
        let timeLeft = currentPhase * mult;

        document.getElementById('timer-display').innerText = `Time: ${timeLeft}s`;
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-display').innerText = `Time: ${timeLeft}s`;
            if (timeLeft <= 0) { clearInterval(timer); showTypeSection(); }
        }, 1000);
    }

    function showTypeSection() {
        document.getElementById('read-section').classList.add('hidden');
        document.getElementById('type-section').classList.remove('hidden');
        document.getElementById('user-input').focus();
    }

    function submitAttempt() {
        const target = currentParagraph.slice(0, currentPhase).join(" ");
        const user = document.getElementById('user-input').value;
        const result = calculateScore(target, user);
        
        phaseScores.push({ 
            phase: currentPhase, score: result.score, 
            html: result.html, userTxt: user || "[Empty]" 
        });

        document.getElementById('type-section').classList.add('hidden');
        document.getElementById('feedback-section').classList.remove('hidden');
        document.getElementById('comparison-output').innerHTML = result.html;
    }

    function calculateScore(target, user) {
        const tWords = target.split(/\s+/);
        const uWords = user.toLowerCase().replace(/[^\w\s]/g, "").split(/\s+/);
        let matches = 0; let html = "";

        tWords.forEach(w => {
            const clean = w.toLowerCase().replace(/[^\w\s]/g, "");
            if (uWords.includes(clean)) { matches++; html += `<span class="correct-word">${w}</span> `; }
            else { html += `<span class="missing-word">${w}</span> `; }
        });
        return { score: Math.round((matches / tWords.length) * 100), html: html.trim() };
    }

    function nextPhase() {
        if (currentPhase < 5) { currentPhase++; startPhase(); }
        else { showResults(); }
    }

    function showResults() {
        document.getElementById('play-screen').classList.add('hidden');
        document.getElementById('results-screen').classList.remove('hidden');
        const list = document.getElementById('scores-list');
        list.innerHTML = ""; let total = 0;

        phaseScores.forEach(s => {
            total += s.score;
            list.innerHTML += `<div class="phase-breakdown">
                <strong>Phase ${s.phase}: ${s.score}%</strong><br>${s.html}<br>
                <small style="color:gray">Typed: "${s.userTxt}"</small>
            </div>`;
        });
        document.getElementById('final-total').innerText = `Total Score: ${Math.round(total/5)}%`;
    }
</script>
</body>
</html>
